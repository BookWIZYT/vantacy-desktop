name: Build and publish Vantacy installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            command: npx electron-builder --win nsis --publish always
            artifact: windows-installer

          - os: macos-latest
            command: npx electron-builder --mac dmg --publish always
            artifact: macos-installer

          - os: ubuntu-latest
            command: npx electron-builder --linux AppImage --publish always
            artifact: linux-installer

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
